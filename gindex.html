<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: #2c3e50; 
      color: #ecf0f1;            
      font-family: 'Poppins', sans-serif; /* 👈 စာလုံးဒီဇိုင်းကို Poppins ပြောင်းလိုက်တာပါ */
      margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center;    
    }
    header {
      background-color: #34495e; width: 100%; padding: 15px 0;
      display: flex; justify-content: space-around; align-items: center;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    }
    header .logo { color: #f1c40f; font-size: 20px; font-weight: bold; }
    header nav a { color: #ecf0f1; text-decoration: none; margin: 0 15px; transition: 0.3s; }
    header nav a:hover { color: #1abc9c; }

    h1 { color: #f1c40f; margin-top: 40px; }
    .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
    .card {
      background-color: #34495e; border: 2px solid #e74c3c; border-radius: 10px;
      padding: 0px; width: 200px; text-align: center; overflow: hidden;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3); transition: transform 0.3s;
    }
    .card:hover { transform: translateY(-10px); border-color: #1abc9c; }
    .card h3 { color: #f1c40f; margin: 0 0 10px 0; }
	.card img {
      width: 100%;       /* ကတ်ပြားအကျယ်အတိုင်း ကွက်တိဖြစ်အောင် */
      height: 150px;     /* ပုံတွေ အမြင့်ညီနေအောင် */
      object-fit: cover; /* ပုံတွေ ရှုံ့တွမသွားဘဲ စမတ်ကျကျ ဖြတ်ညှပ်ပေးတာ */
    }
    button { background-color: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
	/* 🌟 ဖုန်းမျက်နှာပြင် (Screen အကျယ် 600px ထက် ငယ်သွားရင်) ဒီကုဒ် အလုပ်လုပ်ပါမယ် 🌟 */
    @media (max-width: 600px) {
      .card-container {
        flex-direction: column; /* ကတ်ပြားတွေကို ဘေးတိုက်ကနေ အပေါ်အောက် တစ်တန်းစီ ပြောင်းလိုက်တာ */
        align-items: center;
      }
      .card {
        width: 85%; /* ဖုန်းမျက်နှာပြင် အကျယ်နဲ့ အချိုးကျ ကွက်တိဖြစ်သွားအောင် */
      }
      header {
        flex-direction: column; /* မီနူးတန်းကိုလည်း ဖုန်းပေါ်မှာ အပေါ်အောက် ညီအောင် ညှိတာ */
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎒 Zar Chi's Travel</div>
    <nav>
      <a href="gindex.html"><i class="fas fa-home"></i>Home</a>
      <a href="#"><i class="fas fa-map-marker-alt"></i>Destinations</a>
      <a href="gabout.html"><i class="fas fa-user"></i>About</a> <!-- 🌟 gabout.html ကို သွားမယ့်လင့်ခ် -->
    </nav>
  </header>

  <h1>My Dream Travel Destinations</h1>
  <p>I love exploring new places and experiencing different cultures.</p>
  
  <div class="card-container">
    
    <div class="card" onclick="openModal('Chiang Mai Trip', 'ချင်းမိုင်မြို့ရဲ့ တောင်ပေါ်ဘုရားကျောင်းတွေနဲ့ ဆောင်းတွင်းနှင်းမြူတွေကို သွားရောက်ခံစားကြမယ်။')" style="cursor:pointer;">
      <img src="https://images.unsplash.com/photo-1561361058-c24cecae35ca?w=500" alt="Chiang Mai Temple">
      <div class="card-text">
        <h3>Chiang Mai</h3>
        <p>Beautiful temples and mountains.</p>
      </div>
    </div>

    <div class="card"onclick="openModal('Swiss Alps Trip', 'ကမ္ဘာ့အလှဆုံး ဆွတ်စ်အယ်လ်ပ်တောင်တန်းတွေပေါ်မှာ နှင်းလျှောစီးရင်း အကောင်းစားချောကလက်တွေ မြည်းစမ်းမယ်။')" style="cursor:pointer;">
      <img src="https://images.unsplash.com/photo-1530122037265-a5f1f91d3b99?w=500" alt="Swiss">
      <div class="card-text">
        <h3>Swiss</h3>
        <p>Amazing snow and chocolate.</p>
      </div>
    </div>

    <div class="card"onclick="openModal('US City Tour', 'နယူးယောက်မြို့ကြီးရဲ့ မီးရောင်စုံညတွေနဲ့ ဒစ္စနီလန်း ကစားကွင်းကြီးဆီ အပန်းဖြေခရီး သွားကြမယ်။')" style="cursor:pointer;">
      <img src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=500" alt="US">
      <div class="card-text">
        <h3>US</h3>
        <p>Big cities and theme parks.</p>
      </div>
    </div>

  </div>

  <button id="myButton">လျှို့ဝှက်ချက်ကို နှိပ်ကြည့်ပါ</button>

  <script>
    let myName = "Zar Chi Win";
    alert("Welcome to " + myName + "'s travel website! 🌍");
    document.getElementById("myButton").onclick = function() {
      alert("I will travel to Japan next month 🇯🇵✈️");
    };
	// 🌟 ပေါ့ပ်အပ်ကို ဖွင့်ပေးမယ့် Function
    function openModal(title, text) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalText").innerText = text;
      document.getElementById("myModal").style.display = "flex";
    }

    // 🌟 ပေါ့ပ်အပ်ကို ပြန်ပိတ်ပေးမယ့် Function
    function closeModal() {
      document.getElementById("myModal").style.display = "none";
    }
  </script>
  <!-- 🌟 Popup Box အတွက် HTML သေတ္တာအလွတ် (</body> အပေါ်မှာ ထည့်ပါ) 🌟 -->
  <div id="myModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000;">
    <div style="background:#34495e; padding:30px; border-radius:10px; width:300px; text-align:center; border:2px solid #1abc9c;">
      <h2 id="modalTitle" style="color:#f1c40f; margin-top:0;"></h2>
      <p id="modalText" style="color:#ecf0f1;"></p>
      <button onclick="closeModal()" style="background:#e74c3c; color:white; padding:8px 20px; border:none; border-radius:5px; cursor:pointer; margin-top:15px;">ပိတ်မည်</button>
    </div>
  </div>
</body>
</html>
